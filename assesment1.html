<!DOCTYPE html>
<html>
<head>
<title>Student Marks Management System</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    background:#f4f4f4;
}

h1{
    color:#333;
}

.form input{
    padding:10px;
    margin:5px;
}

button{
    padding:10px 15px;
    margin:5px;
    cursor:pointer;
    background:rgb(14, 108, 215);
    color:white;
    border:none;
}

button:hover{
    background-color: rgb(16, 63, 220);
}
#output{
    margin-top:20px;
    padding:15px;
    background:white;
    width:70%;
    margin-left:auto;
    margin-right:auto;
    border-radius:5px;
}

</style>
</head>

<body>

<h1>Student Marks Management System</h1>

<div class="form">

<input type="text" id="name" placeholder="Student Name">
<input type="text" id="roll" placeholder="Roll Number">
<input type="number" id="math" placeholder="Math Marks">
<input type="number" id="physics" placeholder="Physics Marks">
<input type="number" id="dsa" placeholder="DSA Marks">

<br>

<button onclick="addStudent()">Add Student</button>

</div>

<div class="buttons">

<button onclick="displayStudents()">Display All Students</button>
<button onclick="calculateTotal()">Show Total Marks</button>
<button onclick="calculateAverage()">Show Average Marks</button>
<button onclick="showTopStudents()">Average Above 80</button>
<button onclick="showFailedStudents()">Failed Students</button>
<button onclick="countStudents()">Total Students</button>

</div>

<div id="output"></div>

<script>


let students = [];



function addStudent(){

let name = document.getElementById("name").value;
let roll = document.getElementById("roll").value;
let math = Number(document.getElementById("math").value);
let physics = Number(document.getElementById("science").value);
let dsa = Number(document.getElementById("english").value);

let student = {
name:name,
roll:roll,
math:math,
physics:physics,
dsa:dsa,
};

students.push(student);

alert("Student Added Successfully");

}



function displayStudents(){

let output = "<h3>All Students</h3>";

for(let s of students){

output += `
Name: ${s.name} |
Roll: ${s.roll} |
Math: ${s.math} |
Science: ${s.physics} |
English: ${s.dsa} <br>
`;

}

document.getElementById("output").innerHTML = output;

}



function calculateTotal(){

let output = "<h3>Total Marks</h3>";

for(let s of students){

let total = s.math + s.physics + s.dsa;

output += `${s.name} (Roll ${s.roll}) : ${total} <br>`;

}

document.getElementById("output").innerHTML = output;

}



function calculateAverage(){

let output = "<h3>Average Marks</h3>";

for(let s of students){

let total = s.math + s.physics + s.dsa;
let avg = total / 3;

output += `${s.name} : ${avg.toFixed(2)} <br>`;

}

document.getElementById("output").innerHTML = output;

}



function showTopStudents(){

let output = "<h3>Students with Average Above 80</h3>";

for(let s of students){

let avg = (s.math + s.physics + s.dsa) / 3;

if(avg > 80){

output += `${s.name} : ${avg.toFixed(2)} <br>`;

}

}

document.getElementById("output").innerHTML = output;

}



function showFailedStudents(){

let output = "<h3>Failed Students</h3>";

for(let s of students){

let avg = (s.math + s.physics + s.dsa) / 3;

if(avg < 40){

output += `${s.name} : ${avg.toFixed(2)} <br>`;

}

}

document.getElementById("output").innerHTML = output;

}



function countStudents(){

let total = students.length;

document.getElementById("output").innerHTML =
`<h3>Total Students: ${total}</h3>`;

}

</script>

</body>
</html>
