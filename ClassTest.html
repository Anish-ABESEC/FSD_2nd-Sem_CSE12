<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Result Table</title>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                radial-gradient(circle at top left, #cfd9df, #e2ebf0),
                radial-gradient(circle at bottom right, #fbc2eb, #a6c1ee);
            background-blend-mode: screen;
            min-height: 100vh;
            padding: 30px;
        }

        table {
            border-collapse: collapse;
            width: 75%;
            margin: auto;
            background-color: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        caption {
            font-size: 24px;
            font-weight: 600;
            color: #2c3e50;
            padding: 18px;
        }

        th, td {
            padding: 12px 16px;
            text-align: center;
        }

        th {
            background: linear-gradient(135deg, #1e88e5, #1565c0);
            color: #ffffff;
            font-weight: 600;
        }

        th[colspan] {
            background: linear-gradient(135deg, #1565c0, #0d47a1);
        }

        tr:nth-child(even) td {
            background-color: #f5f7fa;
        }

        tr:hover td {
            background-color: #e3f2fd;
            transition: 0.3s;
        }

        td {
            color: #2c3e50;
            font-size: 15px;
        }

        /* Highlight total column */
        td:last-child {
            font-weight: bold;
            color: #1b5e20;
        }

        /* Responsive */
        @media (max-width: 768px) {
            table {
                width: 100%;
            }
            caption {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

<table>
    <caption>📘 School Test Result</caption>

    <tr>
        <th rowspan="2">Student Name</th>
        <th rowspan="2">Roll No</th>
        <th colspan="3">Subjects</th>
        <th rowspan="2">Total</th>
    </tr>

    <tr>
        <th>Maths</th>
        <th>Science</th>
        <th>English</th>
    </tr>

    <tr>
        <td>Anish</td>
        <td>105</td>
        <td>85</td>
        <td>95</td>
        <td>90</td>
        <td>270</td>
    </tr>

    <tr>
        <td>Aman</td>
        <td>102</td>
        <td>85</td>
        <td>85</td>
        <td>90</td>
        <td>260</td>
    </tr>

    <tr>
        <td>Ankit</td>
        <td>107</td>
        <td>90</td>
        <td>85</td>
        <td>80</td>
        <td>255</td>
    </tr>

</table>

</body>
</html>
