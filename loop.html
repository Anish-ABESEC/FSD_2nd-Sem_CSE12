<!DOCTYPE html>
<html>
<head>
    <title>Document</title>
</head>
<body>
    <script>
        for(i = 1;i <= 10;i++) {
            document.write(i + "<br>");
        }
        for(i = 1;i <= 5;i++) {
            document.write("Hello" + "<br>");
        }
        for(i = 10;i >= 1;i--) {
            document.write(i + "<br>");
        }
        var i = 1;
        while(i <= 10) {
            document.write(i + "<br>");
            i++;
        }
        var i = 10;
        while(i >= 1) {
            document.write(i + "<br>");
            i--;
        }
        var i = 10;
        do {
            document.write(i + "<br>");
            i--;
        } while(i >= 1);
        var i = 0;
        do {
            document.write(i + "<br>");
            i--;
        } while(i >= 1);
    </script>
</body>
</html>
